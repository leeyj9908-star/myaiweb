<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이은주 | AI 웹 개발</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
    }
    h1 { font-size: 1.8rem; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { color: #667eea; font-weight: 600; margin-bottom: 16px; }
    p { color: #666; line-height: 1.7; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 12px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요, 이은주입니다</h1>
    <p class="subtitle">AI 웹 개발을 공부하고 있어요</p>
    <p>React와 MUI를 활용한 웹 개발을 배우며<br>멋진 서비스를 만들어가는 중입니다.</p>
    <a class="btn" href="https://github.com/leeyj9908-star" target="_blank">GitHub 방문하기</a>
  </div>
</body>
</html>
